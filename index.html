<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sametaor's World</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

/* Lock body to prevent any accidental viewport overflow */
body { 
  overflow: hidden; 
  background: #000; 
}

/* Scroll wrapper logic */
#scroll-wrap {
  height: 100vh;
  width: 100%;
  overflow-y: scroll;
  overflow-x: hidden; /* Kills any lingering horizontal overflow */
  scroll-snap-type: y mandatory;
  scroll-behavior: smooth;
  
  /* Hides the vertical scrollbar in Firefox/IE/Edge */
  scrollbar-width: none; 
  -ms-overflow-style: none;
}

/* Hides the vertical scrollbar in Chrome/Safari/Opera */
#scroll-wrap::-webkit-scrollbar {
  display: none;
}

/* Sections */
section {
  height: 100vh;
  width: 100%; /* FIX: Changed from 100vw to perfectly respect container bounds */
  scroll-snap-align: start;
  position: relative;
  overflow: hidden;
}

/* ─── HERO ─── */
#hero{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px}
.sky{position:absolute;inset:0;background:linear-gradient(to bottom,#02040f 0%,#060d28 35%,#0e0620 60%,#060010 78%,#000 100%);z-index:0}
#starfield{position:absolute;top:0;left:0;width:100%;height:50%;z-index:1;pointer-events:none}
.star{position:absolute;border-radius:50%;animation-name:starTwinkle;animation-duration:var(--dur);animation-timing-function:ease-in-out;animation-delay:var(--delay);animation-iteration-count:infinite}
@keyframes starTwinkle{0%,100%{opacity:.05;transform:scale(.5)}50%{opacity:var(--peak);transform:scale(1)}}
.horizon{position:absolute;top:50%;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,#ff00cc 30%,#00ffff 70%,transparent);box-shadow:0 0 14px #ff00cc,0 0 28px #00ffff;z-index:3}
.grid-wrap{position:absolute;top:50%;left:-20%;right:-20%;height:55%;z-index:2;perspective:280px;perspective-origin:50% 0%;overflow:hidden}
.grid{width:100%;height:200%;transform:rotateX(72deg);transform-origin:top center;background-image:linear-gradient(rgba(var(--gc,160,0,255),var(--ga,.5)) 1px,transparent 1px),linear-gradient(90deg,rgba(var(--gc,160,0,255),var(--ga,.5)) 1px,transparent 1px);background-size:60px 60px;animation:gridScroll var(--gspd,1s) linear infinite;transition:--ga .08s,--gspd .12s}
@keyframes gridScroll{from{background-position:0 0}to{background-position:0 60px}}
.scanlines{position:absolute;top:50%;left:0;right:0;height:50%;z-index:6;pointer-events:none;background:repeating-linear-gradient(to bottom,transparent 0px,transparent 2px,rgba(0,0,0,.55) 2px,rgba(0,0,0,.55) 4px)}
.scanlines::after{content:'';position:absolute;left:0;right:0;height:60px;background:linear-gradient(to bottom,transparent 0%,rgba(255,0,200,.09) 40%,rgba(255,0,200,.20) 50%,rgba(255,0,200,.09) 60%,transparent 100%);animation:scanBand 3.5s linear infinite}
@keyframes scanBand{from{top:-60px}to{top:100%}}
.content{position:relative;z-index:10;display:flex;flex-direction:column;align-items:center;gap:10px}
.content img.logo{width:323px;height:323px;object-fit:contain;animation:logoPulse 4s ease-in-out infinite}
@keyframes logoPulse{0%,100%{filter:drop-shadow(0 0 20px rgba(255,0,200,.8)) drop-shadow(0 0 50px rgba(255,0,200,.35))}50%{filter:drop-shadow(0 0 36px rgba(255,0,200,1)) drop-shadow(0 0 80px rgba(120,0,255,.6))}}
h1{font-family:'Orbitron',sans-serif;font-size:106px;font-weight:500;letter-spacing:.12em;color:#f5f000;text-shadow:0 0 8px #f5f000,0 0 20px #f0c000,0 0 50px rgba(240,160,0,.65),0 0 90px rgba(240,120,0,.3)}
.scroll-icons{display:flex;flex-direction:column;align-items:center;gap:4px;margin-top:4px}
.scroll-arrow{animation:bounceDown 1.5s ease-in-out infinite}
@keyframes bounceDown{0%,100%{transform:translateY(0);opacity:1}50%{transform:translateY(10px);opacity:.5}}

/* ─── SOLAR SYSTEM ─── */
#solar-system{background:#000}
#solar-canvas{display:block;width:100%;height:100%;cursor:grab}
#solar-canvas.dragging{cursor:grabbing}
#solar-canvas.hovering{cursor:pointer}

/* ─── FLEXIBLE HUD MUSIC PLAYER ─── */
#music-player {
  position: fixed; bottom: 16px; right: 16px; 
  min-width: 220px;
  max-width: 30vw; 
  width: max-content; 
  z-index: 50; font-family: 'Orbitron', sans-serif;
  filter: drop-shadow(0 0 6px rgba(0,255,255,0.4));
  transition: filter 0.4s ease;
}
#music-player.is-playing { filter: drop-shadow(0 0 10px rgba(255,0,204,0.5)); }

@media (max-width: 900px) { #music-player { max-width: 45vw; } }
@media (max-width: 600px) { #music-player { max-width: 70vw; } }

.player-wrap {
  background: #00ffff; padding: 1px;
  clip-path: polygon(24px 0, 100% 0, 100% 100%, 0 100%, 0 24px);
  transition: background 0.4s ease;
}
#music-player.is-playing .player-wrap { background: #ff00cc; }

.player-inner {
  background: #110222;
  clip-path: polygon(23px 0, 100% 0, 100% 100%, 0 100%, 0 23px);
  padding: 12px 14px; display: flex; flex-direction: column;
}

.player-top {
  display: flex; align-items: center; justify-content: flex-start;
  margin-bottom: 6px; gap: 12px; overflow: hidden;
}
.eq-icon {
  display: flex; align-items: center; justify-content: center;
  gap: 3px; height: 18px; flex-shrink: 0;
}
.eq-icon span {
  display: inline-block; width: 3px; background: #00ffff;
  border-radius: 1px; box-shadow: 0 0 5px #00ffff;
}

/* EQ bars: heights driven by JS, smooth transitions */
.eq-icon { min-width: 24px; overflow: visible; }
.eq-icon span { height: 10px; transition: height 0.06s ease; }

.title-wrap {
  flex: 1; overflow: hidden; white-space: nowrap; position: relative; 
  display: flex; align-items: center;
}
.header-title {
  color: #f5f000; font-size: 14px; font-weight: 700; letter-spacing: 0.08em;
  text-shadow: 0 0 6px rgba(245,240,0,0.4); display: inline-block;
}

.track-info-container {
  width: 100%; overflow: hidden; white-space: nowrap; position: relative;
  border-bottom: 1px solid rgba(0,255,255,0.15); padding-bottom: 6px;
}
#music-player.is-playing .track-info-container { border-bottom-color: rgba(255,0,204,0.3); }

#artist-name {
  color: #00ffff; font-weight: 500; font-size: 10px; letter-spacing: 0.1em;
  display: inline-block; text-shadow: 0 0 4px rgba(0,255,255,0.3);
}
#music-player.is-playing #artist-name { color: #ff00cc; text-shadow: 0 0 4px rgba(255,0,204,0.3); }

.header-title.marquee, #artist-name.marquee {
  animation: scrollText 10s linear infinite;
  display: inline-block;
  padding-right: 80px;
}
@keyframes scrollText {
  0%   { transform: translateX(0); }
  100% { transform: translateX(calc(-100% - 80px)); }
}

.hover-reveal {
  max-height: 0; opacity: 0; overflow: hidden;
  transition: max-height 0.4s ease, opacity 0.3s ease, margin-top 0.3s ease;
}
#music-player:hover .hover-reveal { max-height: 140px; opacity: 1; margin-top: 8px; }

/* 3 Mode buttons */
.player-modes { display: flex; gap: 4px; margin-bottom: 10px; }
.mode-btn {
  flex: 1; background: rgba(0,0,0,0.4); border: 1px solid rgba(0,220,220,0.2);
  color: rgba(0,220,220,0.4); font-family: 'Orbitron', sans-serif;
  font-size: 8px; letter-spacing: 0.05em; padding: 5px 0; cursor: pointer;
  transition: all 0.2s; border-radius: 1px;
}
.mode-btn.active {
  background: rgba(0,255,255,0.1); color: #00ffff; border-color: #00ffff;
  text-shadow: 0 0 5px rgba(0,255,255,0.5); box-shadow: inset 0 0 8px rgba(0,255,255,0.2);
}

.ctrl-row { display: flex; gap: 4px; justify-content: center; margin-bottom: 10px; }
.ctrl-btn {
  background: rgba(0,220,220,.05); border: 1px solid rgba(0,220,220,.2);
  color: #00ffcc; cursor: pointer; font-size: 11px; padding: 4px 10px;
  transition: all 0.2s; border-radius: 1px;
}
.ctrl-btn:hover { background: rgba(0,220,220,.2); border-color: #00ffff; color: #00ffff; box-shadow: 0 0 8px rgba(0,255,255,.3);}
.ctrl-btn.active-state { background: rgba(255,0,204,.15); color: #ff00cc; border-color: #ff00cc; box-shadow: 0 0 8px rgba(255,0,204,.4);}
.local-only { display: none; }
#music-player.is-local .local-only { display: flex; }

.prog-bar { 
  width: 100%; height: 3px; background: rgba(0,220,220,.15); 
  border: 1px solid rgba(0,220,220,.25); cursor: pointer; position: relative; border-radius: 1px;
}
.prog-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #aa00ff, #00ffff); pointer-events: none; transition: width 0.1s linear;}
.time-row { display: flex; justify-content: space-between; font-size: 8px; color: rgba(0,220,220,.5); margin-top: 4px; margin-bottom: 8px;}
.vol-row { display: flex; align-items: center; gap: 8px; }
.vol-slider { -webkit-appearance: none; width: 100%; height: 2px; background: rgba(0,220,220,.3); outline: none; cursor: pointer; }
.vol-slider::-webkit-slider-thumb {
  -webkit-appearance: none; width: 8px; height: 8px; background: #00ffff;
  clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%); box-shadow: 0 0 5px #00ffff;
}

/* Solar Controls */
#sol-controls{
  position:absolute;bottom:16px;left:50%;transform:translateX(-50%);
  display:flex;align-items:center;gap:10px;
  background:rgba(0,0,0,.72);border:1px solid rgba(0,220,220,.2);
  padding:8px 16px;z-index:30;font-family:'Orbitron',sans-serif;
  backdrop-filter:blur(6px);white-space:nowrap;border-radius:2px;
  pointer-events:auto;
}
#btn-pause{
  font-family:'Orbitron',sans-serif;font-size:9px;letter-spacing:.1em;
  background:transparent;border:1px solid rgba(0,220,220,.35);
  color:rgba(0,220,220,.6);padding:5px 11px;cursor:pointer;border-radius:2px;
  transition:all .15s;flex-shrink:0;
}
#btn-pause:hover{color:#00ffff;border-color:#00ffff}
#btn-pause.paused{color:#ff55aa;border-color:#ff55aa}
.ctrl-sep{color:rgba(0,220,220,.18);font-size:16px;margin:0 2px;user-select:none}
.ctrl-lbl{color:rgba(0,220,220,.35);font-size:9px;letter-spacing:.12em;flex-shrink:0}

/* Speed slider */
#speed-wrap{display:flex;flex-direction:column;gap:4px;width:280px}
#spd-slider{
  -webkit-appearance:none;appearance:none;
  width:100%;height:3px;cursor:pointer;outline:none;border-radius:0;
  background:linear-gradient(90deg,#00ffff,#aa00ff,#ff00cc);
}
#spd-slider::-webkit-slider-thumb{
  -webkit-appearance:none;width:12px;height:12px;
  background:#f5f000;border:none;cursor:pointer;
  box-shadow:0 0 8px #f5f000;clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
}
#spd-slider::-moz-range-thumb{width:12px;height:12px;background:#f5f000;border:none;cursor:pointer;border-radius:0}
#spd-labels{display:flex;justify-content:space-between;padding:0 2px}
#spd-labels span{font-size:8px;color:rgba(0,200,200,.3);letter-spacing:.05em;cursor:pointer;transition:color .15s}
#spd-labels span.active{color:#f5f000;text-shadow:0 0 5px #f5f000}
#spd-labels span:hover{color:rgba(0,220,220,.7)}

/* Reset + watermark */
#zoom-reset{
  position:absolute;top:16px;right:20px;z-index:20;
  font-family:'Orbitron',sans-serif;font-size:10px;letter-spacing:.12em;
  color:rgba(0,220,220,.5);border:1px solid rgba(0,220,220,.3);
  background:rgba(0,0,0,.5);padding:5px 12px;cursor:pointer;display:none
}
#zoom-reset:hover{color:#00ffff;border-color:#00ffff}
#watermark{
  position:absolute;top:18px;left:20px;z-index:10;
  font-family:'Orbitron',sans-serif;font-size:12px;
  color:rgba(0,220,220,.28);pointer-events:none;letter-spacing:.1em
}
</style>
</head>
<body>

<div id="music-player">
  <div class="player-wrap">
    <div class="player-inner">
      
      <div class="player-top">
        <div class="eq-icon" id="eq-icon"></div>
        <div class="title-wrap" id="title-wrap">
          <div class="header-title" id="song-title">SYSTEM READY</div>
        </div>
      </div>

      <div class="track-info-container" id="marquee-wrap">
        <div id="artist-name">SELECT SOURCE</div>
      </div>

      <div class="hover-reveal">
        <div class="player-modes">
          <button id="mode-hosted" class="mode-btn active">Synthwave</button>
          <button id="mode-local" class="mode-btn">Local</button>
          <button id="mode-yt" class="mode-btn">E. Gems💎</button>
        </div>

        <div class="ctrl-row">
          <button class="ctrl-btn" id="btn-prev">⏮</button>
          <button class="ctrl-btn" id="btn-play">▶</button>
          <button class="ctrl-btn" id="btn-next">⏭</button>
          <button class="ctrl-btn" id="btn-shuffle" title="Shuffle">🔀</button>
          <button class="ctrl-btn" id="btn-repeat" title="Repeat">🔁</button>
          <button class="ctrl-btn local-only" id="btn-load" title="Load Folder">📂</button>
        </div>

        <div class="prog-bar" id="prog-bar">
          <div class="prog-fill" id="prog-fill"></div>
        </div>
        <div class="time-row">
          <span id="time-curr">0:00</span>
          <span id="time-tot">0:00</span>
        </div>

        <div class="vol-row">
          <span style="font-size:11px; color:#00ffff; text-shadow:0 0 3px #00ffff;">🔊</span>
          <input type="range" class="vol-slider" id="vol-slider" min="0" max="100" value="50">
        </div>
      </div>
      
    </div>
  </div>

  <audio id="hosted-audio" style="display:none;" crossorigin="anonymous"></audio>
  <input type="file" id="local-upload" accept="audio/*" multiple webkitdirectory directory style="display:none;">
  <audio id="local-audio" style="display:none;"></audio>

  <div style="position: absolute; left: -9999px; top: -9999px; width: 200px; height: 200px; visibility: visible; opacity: 1;">
    <div id="yt-api-container"></div>
  </div>
</div>


<div id="scroll-wrap">

<section id="hero">
  <div class="sky"></div>
  <div id="starfield"></div>
  <div class="horizon"></div>
  <div class="grid-wrap"><div class="grid"></div></div>
  <div class="scanlines"></div>
  <div class="content">
    <img class="logo" src="Logo_Vaporwave.svg" alt="Sametaor Logo">
    <h1>SAMETAOR</h1>
    <div class="scroll-icons">
      <img src="Scroll_Down_Hex.svg" alt="" width="50">
      <img src="Scroll_Down_Triangle.svg" alt="" width="20" class="scroll-arrow">
    </div>
  </div>
</section>

<section id="solar-system">
  <canvas id="solar-canvas"></canvas>
  <div id="watermark">WHERE SHALL WE GO?</div>
  <button id="zoom-reset">⟲ RESET VIEW</button>
  <div id="sol-controls">
    <button id="btn-pause">⏸ PAUSE</button>
    <span class="ctrl-sep">|</span>
    <span class="ctrl-lbl">SPEED</span>
    <div id="speed-wrap">
      <input type="range" id="spd-slider" min="0" max="7" step="1" value="4">
      <div id="spd-labels">
        <span>0.05×</span><span>0.1×</span><span>0.25×</span><span>0.5×</span>
        <span class="active">1×</span><span>2×</span><span>5×</span><span>10×</span>
      </div>
    </div>
  </div>
</section>
</div>

<script>
/* ════ MUSIC PLAYER LOGIC ════ */
(function(){
  // ── SERVER PLAYLIST CONFIGURATION ──
  // Step 1: Put your MP3 files in a folder named "music" in the root directory.
  // Step 2: Type their exact names into this array. 
  // Tip: If you name them "Artist - Title.mp3", the player will split the text perfectly!
  const SERVER_MUSIC_FOLDER = "music/";
  const SERVER_FILES = [
    "HOME - Resonance.mp3",
    "HOME - Hold.mp3",
    "sametaor - L♾️PERAMA.mp3",
    "sametaor - Trancium.mp3",
    "sametaor - Trancium_v2.mp3"
  ];

  // UI Elements
  const pWrap = document.getElementById('music-player');
  const sTitle = document.getElementById('song-title');
  const aName = document.getElementById('artist-name');
  const tWrap = document.getElementById('title-wrap');
  const mWrap = document.getElementById('marquee-wrap');
  const btnHosted = document.getElementById('mode-hosted');
  const btnLocal = document.getElementById('mode-local');
  const btnYt = document.getElementById('mode-yt');
  const btnPlay = document.getElementById('btn-play');
  const btnPrev = document.getElementById('btn-prev');
  const btnNext = document.getElementById('btn-next');
  const btnShuffle = document.getElementById('btn-shuffle');
  const btnRepeat = document.getElementById('btn-repeat');
  const btnLoad = document.getElementById('btn-load');
  const progBar = document.getElementById('prog-bar');
  const progFill = document.getElementById('prog-fill');
  const timeCurr = document.getElementById('time-curr');
  const timeTot = document.getElementById('time-tot');
  const volSlider = document.getElementById('vol-slider');
  
  // Audio Elements
  const hostedAudio = document.getElementById('hosted-audio');
  const localAudio = document.getElementById('local-audio');
  const localUpload = document.getElementById('local-upload');

  // Global State
  let mode = 'hosted'; 
  let isPlaying = false;
  let globalShuffle = false;
  let globalRepeat = false;

  // Array Shuffle Helper
  function shuffleArray(arr) {
    for(let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
  }

  // Hosted State Setup
  let hostedPlaylist = SERVER_FILES.map(file => ({
    url: SERVER_MUSIC_FOLDER + file,
    rawName: file.replace(/\.[^/.]+$/, "")
  }));
  let hostedMap = [];
  let hostedIdx = 0;

  function buildHostedMap() {
    hostedMap = Array.from({length: hostedPlaylist.length}, (_, i) => i);
    if(globalShuffle) shuffleArray(hostedMap);
  }
  buildHostedMap();

  // Local State Setup
  let localFiles = [];
  let playlistMap = []; 
  let localIdx = 0; 

  function buildLocalPlaylist() {
    playlistMap = Array.from({length: localFiles.length}, (_, i) => i);
    if(globalShuffle) shuffleArray(playlistMap);
  }

  // YT State (Lazy Loaded)
  let ytPlayer = null;
  let ytScriptLoaded = false;
  let ytReady = false;
  let ytStarted = false;
  let currentYtTitle = "";
  let currentYtArtist = "";

  function fmt(time) {
    if(isNaN(time) || time < 0 || time === Infinity) return "LIVE";
    const m = Math.floor(time / 60);
    const s = Math.floor(time % 60);
    return m + ":" + (s < 10 ? "0" : "") + s;
  }

  function triggerSongChange(rawTitle, rawArtist) {
    let title = rawTitle;
    let artist = rawArtist;
    
    if (title.includes(" - ")) {
      const parts = title.split(" - ");
      artist = parts[0].trim();
      title = parts.slice(1).join(" - ").trim();
    }

    sTitle.textContent = title;
    aName.textContent = artist;
    sTitle.classList.remove('marquee');
    aName.classList.remove('marquee');

    setTimeout(() => {
      const vw20 = window.innerWidth * 0.2;
      const titleW = sTitle.scrollWidth;
      if (titleW > vw20) {
        sTitle.classList.add('marquee');
        setEqBars(5);
      } else {
        const n = Math.max(3, Math.min(12, Math.round(5 + (1 - titleW / vw20) * 7)));
        setEqBars(n);
      }
      if (aName.scrollWidth > mWrap.clientWidth) aName.classList.add('marquee');
    }, 150);
  }

  function updatePlayUI(playing) {
    isPlaying = playing;
    btnPlay.textContent = playing ? '⏸' : '▶';
    pWrap.classList.toggle('is-playing', playing); 
  }

  /* ── LAZY-LOAD YOUTUBE MODULE ── */
  function initYouTube() {
    ytScriptLoaded = true;
    triggerSongChange("BOOTING YT MODULE...", "Please Wait");

    const tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    const firstScriptTag = document.getElementsByTagName('script')[0];
    firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

    window.onYouTubeIframeAPIReady = function() {
      ytPlayer = new YT.Player('yt-api-container', {
        height: '200', width: '200', 
        playerVars: {
          controls: 0, showinfo: 0, rel: 0, autoplay: 0,
          origin: window.location.origin !== "null" ? window.location.origin : "*"
        },
        events: {
          'onReady': (e) => {
            ytReady = true;
            e.target.cuePlaylist({
              listType: 'playlist',
              list: 'PL63ZO-jXFTatssIiQjDHSa6X-WPu-EyYV'
            });
            e.target.setVolume(parseInt(volSlider.value));
            if(globalShuffle) e.target.setShuffle(true);
            if(globalRepeat) e.target.setLoop(true);
            
            if(mode === 'yt') triggerSongChange("YT GEMS CONNECTED", "PRESS PLAY");
          },
          'onStateChange': (e) => {
            if (e.data === YT.PlayerState.PLAYING) {
              updatePlayUI(true);
              if (!ytStarted) { 
                if(globalShuffle) e.target.setShuffle(true); 
                ytStarted = true; 
              }
              const data = ytPlayer.getVideoData();
              if(data && data.title && data.title !== currentYtTitle) {
                 currentYtTitle = data.title;
                 currentYtArtist = data.author || "YouTube Music";
                 triggerSongChange(currentYtTitle, currentYtArtist);
              }
            } else if (e.data === YT.PlayerState.PAUSED) {
              updatePlayUI(false);
            } else if (e.data === YT.PlayerState.ENDED) {
               ytPlayer.nextVideo();
            }
          },
          'onError': (e) => {
             triggerSongChange("YT ERROR: " + (e.data===150 ? "BLOCKED BY OWNER" : e.data), "YouTube Music");
          }
        }
      });
    };
  }

  /* ── HOSTED AUDIO LOGIC ── */
  function playHostedTrack() {
    if (hostedPlaylist.length === 0) {
      triggerSongChange("NO FILES", "Server Directory");
      return;
    }
    const actualIdx = hostedMap[hostedIdx];
    const track = hostedPlaylist[actualIdx];
    
    hostedAudio.src = track.url;
    hostedAudio.play().catch(e => console.log("Waiting for user interaction"));
    triggerSongChange(track.rawName, "Server Directory");
  }

  hostedAudio.addEventListener('play', () => updatePlayUI(true));
  hostedAudio.addEventListener('pause', () => updatePlayUI(false));
  hostedAudio.addEventListener('ended', () => {
    if(globalRepeat && hostedPlaylist.length === 1) { hostedAudio.play(); return; }
    hostedIdx++;
    if(hostedIdx >= hostedPlaylist.length) {
      if(globalRepeat) { hostedIdx = 0; playHostedTrack(); }
      else { hostedIdx = 0; updatePlayUI(false); }
    } else {
      playHostedTrack();
    }
  });

  /* ── LOCAL FILES LOGIC ── */
  btnLoad.addEventListener('click', () => localUpload.click());
  
  localUpload.addEventListener('change', (e) => {
    localFiles = Array.from(e.target.files).filter(f => f.type.startsWith('audio/'));
    if(localFiles.length === 0) return;
    buildLocalPlaylist();
    localIdx = 0;
    playLocalTrack();
  });

  function playLocalTrack() {
    if(localFiles.length === 0) return;
    const actualIdx = playlistMap[localIdx];
    const file = localFiles[actualIdx];
    localAudio.src = URL.createObjectURL(file);
    localAudio.play();
    triggerSongChange(file.name.replace(/\.[^/.]+$/, ""), "Local Directory");
  }

  localAudio.addEventListener('play', () => updatePlayUI(true));
  localAudio.addEventListener('pause', () => updatePlayUI(false));
  localAudio.addEventListener('ended', () => {
    if(globalRepeat && localFiles.length === 1) { localAudio.play(); return; }
    localIdx++;
    if(localIdx >= localFiles.length) {
      if(globalRepeat) { localIdx = 0; playLocalTrack(); }
      else { localIdx = 0; updatePlayUI(false); }
    } else {
      playLocalTrack();
    }
  });


  /* ── UNIVERSAL TOGGLES ── */
  btnShuffle.addEventListener('click', () => {
    globalShuffle = !globalShuffle;
    btnShuffle.classList.toggle('active-state', globalShuffle);
    
    if(mode === 'hosted' && hostedPlaylist.length > 0) {
      const currActual = hostedMap[hostedIdx];
      buildHostedMap();
      hostedIdx = hostedMap.indexOf(currActual);
    } else if(mode === 'local' && localFiles.length > 0) {
      const currActual = playlistMap[localIdx];
      buildLocalPlaylist();
      localIdx = playlistMap.indexOf(currActual);
    } else if(mode === 'yt' && ytReady) {
      ytPlayer.setShuffle(globalShuffle);
    }
  });

  btnRepeat.addEventListener('click', () => {
    globalRepeat = !globalRepeat;
    btnRepeat.classList.toggle('active-state', globalRepeat);
    
    if(mode === 'yt' && ytReady) {
      ytPlayer.setLoop(globalRepeat);
    }
  });

  /* ── SHARED CONTROLS ── */
  btnHosted.addEventListener('click', () => setMode('hosted'));
  btnLocal.addEventListener('click', () => setMode('local'));
  btnYt.addEventListener('click', () => setMode('yt'));

  function setMode(newMode) {
    mode = newMode;
    btnHosted.classList.toggle('active', mode === 'hosted');
    btnLocal.classList.toggle('active', mode === 'local');
    btnYt.classList.toggle('active', mode === 'yt');
    
    pWrap.classList.toggle('is-local', mode === 'local');
    
    if (!hostedAudio.paused) hostedAudio.pause();
    if (!localAudio.paused) localAudio.pause();
    if (ytReady && ytPlayer && ytPlayer.getPlayerState && ytPlayer.getPlayerState() === YT.PlayerState.PLAYING) ytPlayer.pauseVideo();
    
    updatePlayUI(false);

    if (mode === 'hosted') {
      triggerSongChange(hostedPlaylist.length ? "READY (PRESS PLAY)" : "NO FILES CONFIGURED", "Server Directory");
    } else if (mode === 'local') {
      triggerSongChange(localFiles.length ? "READY (PRESS PLAY)" : "LOAD FOLDER", "Local Directory");
    } else if (mode === 'yt') {
      if (!ytScriptLoaded) {
        initYouTube();
      } else {
        triggerSongChange(currentYtTitle || "YT GEMS CONNECTED", currentYtArtist || "PRESS PLAY");
      }
    }
  }

  btnPlay.addEventListener('click', () => {
    if(mode === 'hosted') {
      if(isPlaying) hostedAudio.pause();
      else if (hostedAudio.src && !hostedAudio.src.endsWith(window.location.pathname)) hostedAudio.play();
      else playHostedTrack();
    } else if (mode === 'local') {
      if(localFiles.length === 0) return localUpload.click();
      if(isPlaying) localAudio.pause();
      else localAudio.play();
    } else if (mode === 'yt') {
      if(!ytReady) return;
      if(isPlaying) ytPlayer.pauseVideo();
      else ytPlayer.playVideo();
    }
  });

  btnNext.addEventListener('click', () => {
    if(mode === 'hosted' && hostedPlaylist.length > 0) {
      hostedIdx = (hostedIdx + 1) % hostedPlaylist.length;
      playHostedTrack();
    } else if(mode === 'local' && localFiles.length > 0) {
      localIdx = (localIdx + 1) % localFiles.length;
      playLocalTrack();
    } else if(mode === 'yt' && ytReady) {
      ytPlayer.nextVideo();
    }
  });

  btnPrev.addEventListener('click', () => {
    if(mode === 'hosted' && hostedPlaylist.length > 0) {
      hostedIdx = hostedIdx === 0 ? hostedPlaylist.length - 1 : hostedIdx - 1;
      playHostedTrack();
    } else if(mode === 'local' && localFiles.length > 0) {
      localIdx = localIdx === 0 ? localFiles.length - 1 : localIdx - 1;
      playLocalTrack();
    } else if(mode === 'yt' && ytReady) {
      ytPlayer.previousVideo();
    }
  });

  /* ── PROGRESS & VOLUME ── */
  volSlider.addEventListener('input', (e) => {
    const v = parseInt(e.target.value);
    hostedAudio.volume = v / 100;
    localAudio.volume = v / 100;
    if(ytReady) ytPlayer.setVolume(v);
  });

  progBar.addEventListener('click', (e) => {
    const rect = progBar.getBoundingClientRect();
    const pos = (e.clientX - rect.left) / rect.width;
    
    if(mode === 'hosted' && isFinite(hostedAudio.duration)) {
      hostedAudio.currentTime = pos * hostedAudio.duration;
    } else if(mode === 'local' && localAudio.duration) {
      localAudio.currentTime = pos * localAudio.duration;
    } else if(mode === 'yt' && ytReady && ytPlayer.getDuration) {
      ytPlayer.seekTo(pos * ytPlayer.getDuration(), true);
    }
  });

  setInterval(() => {
    let curr = 0, tot = 0;

    if(mode === 'yt' && ytReady && isPlaying && ytPlayer.getCurrentTime) {
      curr = ytPlayer.getCurrentTime(); tot = ytPlayer.getDuration();
    } else if (mode === 'hosted' && isPlaying && hostedAudio) {
      curr = hostedAudio.currentTime; tot = hostedAudio.duration;
    } else if (mode === 'local' && isPlaying && localAudio) {
      curr = localAudio.currentTime; tot = localAudio.duration;
    }
    
    if(tot > 0 && isFinite(tot)) {
      progFill.style.width = (curr / tot * 100) + "%";
      timeCurr.textContent = fmt(curr);
      timeTot.textContent = fmt(tot);
    } else if (tot === Infinity) {
      progFill.style.width = "100%";
      timeCurr.textContent = "LIVE";
      timeTot.textContent = "STREAM";
    } else {
      progFill.style.width = "0%";
    }
  }, 500);

  /* ── setEqBars: rebuild eq-icon spans ── */
  function setEqBars(n) {
    const eq = document.getElementById('eq-icon');
    if (!eq) return;
    // Keep existing spans if count matches
    if (eq.children.length === n) return;
    eq.innerHTML = '';
    for (let i = 0; i < n; i++) {
      const s = document.createElement('span');
      s.style.height = '10px';
      eq.appendChild(s);
    }
    // Normalise eq-icon width so title doesn't jump
    eq.style.width = (n * 3 + (n - 1) * 3) + 'px';
    eq.style.flexShrink = '0';
  }
  // Init 5 bars on load
  setEqBars(5);

  /* ── Web Audio API: connect sources to analyser ── */
  let _actx = null, _analyser = null, _freqData = null;
  const _src = {};

  function _getCtx() {
    if (_actx) return _actx;
    _actx = new (window.AudioContext || window.webkitAudioContext)();
    _analyser = _actx.createAnalyser();
    _analyser.fftSize = 256;
    _analyser.smoothingTimeConstant = 0.82;
    _freqData = new Uint8Array(_analyser.frequencyBinCount);
    _analyser.connect(_actx.destination);
    return _actx;
  }

  function _connectEl(el, key) {
    try {
      _getCtx();
      if (_src[key]) return;
      const node = _actx.createMediaElementSource(el);
      node.connect(_analyser);
      _src[key] = node;
    } catch(e) { /* CORS or already connected */ }
  }

  hostedAudio.addEventListener('play', () => {
    _connectEl(hostedAudio, 'hosted');
    if (_actx && _actx.state === 'suspended') _actx.resume();
  });
  localAudio.addEventListener('play', () => {
    _connectEl(localAudio, 'local');
    if (_actx && _actx.state === 'suspended') _actx.resume();
  });

  /* Expose to grid/visualizer loop */
  window._viz = {
    getFreq() {
      if (!_analyser) return null;
      _analyser.getByteFrequencyData(_freqData);
      return _freqData;
    },
    isActive() { return isPlaying; },
    getMode()  { return mode; }
  };

})();

/* ════ VISUALIZER + GRID AUDIO LOOP ════ */
(function(){
  const gridEl  = document.querySelector('.grid');
  const eqEl    = document.getElementById('eq-icon');

  // --- TILE ENGINE SETUP ---
  // Create a canvas perfectly overlaid inside the grid to inherit its 3D transform
  const tileCanvas = document.createElement('canvas');
  tileCanvas.id = 'tile-canvas';
  tileCanvas.style.cssText = 'position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:1; mix-blend-mode: screen;';
  if (gridEl) gridEl.appendChild(tileCanvas);
  const tctx = tileCanvas ? tileCanvas.getContext('2d') : null;

  let cw = 0, ch = 0;
  function resizeGrid() {
    if (!gridEl || !tileCanvas) return;
    // Canvas dimensions match the un-transformed CSS dimensions of the grid
    cw = tileCanvas.width = gridEl.clientWidth;
    ch = tileCanvas.height = gridEl.clientHeight;
  }
  window.addEventListener('resize', resizeGrid);
  resizeGrid();

  // Take over the grid background animation manually for perfect pixel-sync with tiles
  if (gridEl) gridEl.style.animation = 'none';
  let gridTotalScrolled = 0;

  const tiles = [];
  const colCooldown = new Array(150).fill(0); // Prevents overlap in columns
  const palette = ['#00ffff', '#ff00cc', '#aa00ff', '#f5f000']; 
  let lastTs = null;
  let prevBass = 0;
  // --- END TILE ENGINE SETUP ---

  // Smoothed values
  let sEnergy = 0, sBass = 0, sMid = 0, sHi = 0;
  const barSmooth = [];
  let phase = 0;

  function lerp(a, b, t) { return a + (b - a) * t; }

  function tick(ts) {
    requestAnimationFrame(tick);
    
    // Calculate delta time for smooth scrolling across refresh rates
    if (lastTs === null) lastTs = ts;
    const dt = Math.min((ts - lastTs) / 1000, 0.1); 
    lastTs = ts;

    const viz = window._viz;
    if (!viz) return;

    const active  = viz.isActive();
    const isYT    = viz.getMode() === 'yt';
    const freq    = (!isYT && active) ? viz.getFreq() : null;
    const bars    = eqEl ? eqEl.querySelectorAll('span') : [];
    const n       = bars.length;

    let energy = 0, bass = 0, mid = 0, hi = 0;

    if (freq && active) {
      let bSum = 0, mSum = 0, hSum = 0, tot = 0;
      for (let i = 0; i < freq.length; i++) {
        tot += freq[i];
        if (i < 4)        bSum += freq[i];
        else if (i < 20)  mSum += freq[i];
        else if (i < 60)  hSum += freq[i];
      }
      energy = tot  / (freq.length * 255);
      bass   = bSum / (4   * 255);
      mid    = mSum / (16  * 255);
      hi     = hSum / (40  * 255);

      const step = Math.floor(freq.length * 0.65 / n); 
      for (let i = 0; i < n; i++) {
        let bv = 0;
        for (let j = 0; j < step; j++) bv += freq[i * step + j];
        const raw = bv / (step * 255);
        barSmooth[i] = lerp(barSmooth[i] || 0.1, raw, 0.22);
        bars[i].style.height = Math.max(2, Math.round(barSmooth[i] * 22)) + 'px';
      }

    } else if (active && isYT) {
      phase += 0.04;
      energy = 0.28 + 0.18 * Math.sin(phase * 2.3);
      bass   = 0.35 + 0.25 * Math.abs(Math.sin(phase * 1.1));
      for (let i = 0; i < n; i++) {
        const h = 3 + 17 * Math.abs(Math.sin(phase * (1.2 + i * 0.35) + i * 0.7));
        barSmooth[i] = lerp(barSmooth[i] || 0.1, h / 20, 0.15);
        bars[i].style.height = Math.max(2, Math.round(barSmooth[i] * 20)) + 'px';
      }

    } else {
      phase += 0.012;
      for (let i = 0; i < n; i++) {
        const rest = 0.05 + 0.03 * Math.sin(phase + i * 0.9);
        barSmooth[i] = lerp(barSmooth[i] || rest, rest, 0.04);
        bars[i].style.height = Math.max(2, Math.round(barSmooth[i] * 22)) + 'px';
      }
    }

    sEnergy = lerp(sEnergy, active ? energy : 0, active ? 0.12 : 0.04);
    sBass   = lerp(sBass,   active ? bass   : 0, active ? 0.15 : 0.04);
    sMid    = lerp(sMid,    active ? mid    : 0, active ? 0.12 : 0.04);
    sHi     = lerp(sHi,     active ? hi     : 0, active ? 0.10 : 0.03);

    // Grid reactivity variables
    const alpha = Math.min(1.0, 0.28 + sBass * 1.2 + sMid * 0.35);
    const spd   = Math.max(0.28, 1.0 - sEnergy * 0.85);
    const r = Math.round(160 + sHi * 80);
    const b = Math.round(255 - sBass * 60);

    if (gridEl) {
      gridEl.style.setProperty('--ga',   alpha.toFixed(3));
      gridEl.style.setProperty('--gc',   `${r},0,${b}`);
      const wrap = gridEl.parentElement;
      if (wrap) {
        const glow = (sBass * 18).toFixed(1);
        wrap.style.filter = active ? `drop-shadow(0 0 ${glow}px rgba(${r},0,${b},0.7))` : 'none';
      }
    }

    // ── PIANO TILES SYNC & RENDER ──
    if (tctx && gridEl) {
      // 1. Perfectly sync grid lines with tile speed
      const scrollStep = (60 / spd) * dt;
      gridTotalScrolled += scrollStep;
      const gridOffset = gridTotalScrolled % 60;
      gridEl.style.backgroundPosition = `0px ${gridOffset}px`;

      // 2. Tile Spawning
      const numCols = Math.floor(cw / 60);
      if (active && sEnergy > 0.12) {
        // Spawn more heavily on hard bass hits
        let spawns = sBass > 0.6 ? 2 : (Math.random() < sEnergy * 0.4 ? 1 : 0);
        for (let i = 0; i < spawns; i++) {
           const c = Math.floor(Math.random() * numCols);
           if (colCooldown[c] <= 0) {
              tiles.push({
                col: c,
                y: gridOffset - 120, // Lock strictly to grid vertices
                color: palette[Math.floor(Math.random() * palette.length)],
                state: 'falling',
                opacity: 0,
                pressGlow: 0
              });
              // Ensure gap between tiles on the same column
              colCooldown[c] = 60 + Math.random() * 240; 
           }
        }
      }

      // Cool down columns based on scroll speed
      for (let i = 0; i < colCooldown.length; i++) {
        if (colCooldown[i] > 0) colCooldown[i] -= scrollStep;
      }

      // 3. Beat Detection
      const isBeat = (sBass > prevBass + 0.04 && sBass > 0.45) || (sEnergy > 0.7);
      prevBass = sBass;

      // 4. Render Cycle
      tctx.clearRect(0, 0, cw, ch);
      
      const pressZone = ch * 0.68; // Virtual "hit line" position
      const hitTolerance = ch * 0.20; // Forgiving hit box

      // Draw subtle dashed "hit line" horizon
      if (active) {
          tctx.save();
          tctx.strokeStyle = `rgba(${r},255,${b}, 0.25)`;
          tctx.lineWidth = 2;
          tctx.setLineDash([15, 20]);
          tctx.beginPath();
          tctx.moveTo(0, pressZone);
          tctx.lineTo(cw, pressZone);
          tctx.stroke();
          tctx.restore();
      }

      // Update and draw each tile
      for (let i = tiles.length - 1; i >= 0; i--) {
        const t = tiles[i];

        if (t.state === 'falling') {
           t.y += scrollStep; // Move synchronously with grid background
           t.opacity = Math.min(1, t.opacity + dt * 3);

           // Detect press on beat
           if (isBeat && Math.abs(t.y - pressZone) < hitTolerance) {
              t.state = 'pressed';
              t.pressGlow = 1.0;
           } else if (t.y > ch) {
              tiles.splice(i, 1); // Culling off-screen tiles
              continue;
           }
        } else if (t.state === 'pressed') {
           t.y += scrollStep * 0.3; // Slight pause on impact
           t.pressGlow -= dt * 2.5;
           t.opacity -= dt * 2;
           if (t.opacity <= 0 || t.pressGlow <= 0) {
              tiles.splice(i, 1);
              continue;
           }
        }

        // Calculate precise grid vertices
        tctx.save();
        const x = t.col * 60 + 1;
        const y = t.y + 1;
        const w = 58; 
        const h = 58;

        // Smooth fade-in at the horizon top
        const horizonFade = Math.min(1, Math.max(0, (t.y + 100) / 250));
        tctx.globalAlpha = t.opacity * horizonFade;

        if (t.state === 'falling') {
           // Idle falling tile (transparent fill, neon stroke)
           tctx.fillStyle = t.color;
           tctx.globalAlpha = t.opacity * horizonFade * 0.15;
           tctx.fillRect(x, y, w, h);

           tctx.globalAlpha = t.opacity * horizonFade * 0.7;
           tctx.strokeStyle = t.color;
           tctx.lineWidth = 2;
           tctx.strokeRect(x, y, w, h);

           tctx.shadowColor = t.color;
           tctx.shadowBlur = 8;
           tctx.strokeRect(x, y, w, h);

        } else if (t.state === 'pressed') {
           // Pressed tile (bright white flash, heavy color glow, shrink effect)
           tctx.globalAlpha = t.opacity;
           tctx.fillStyle = '#ffffff';
           tctx.shadowColor = t.color;
           tctx.shadowBlur = 40 * t.pressGlow;

           const shrink = (1 - t.pressGlow) * 15;
           tctx.fillRect(x + shrink, y + shrink, w - shrink*2, h - shrink*2);
        }
        tctx.restore();
      }
    }
  }

  requestAnimationFrame(tick);
})();

(function(){
const canvas=document.getElementById('solar-canvas');

const τ=Math.PI*2,rng=(a,b)=>a+Math.random()*(b-a);

function clip(px,py,pr,fn){ctx.save();ctx.beginPath();ctx.arc(px,py,pr,0,τ);ctx.clip();fn();ctx.restore();}

function txMercury(px,py,pr,spin,tilt){clip(px,py,pr,()=>{

  // Highlands

  ctx.beginPath();ctx.ellipse(px+pr*.3,py-pr*.25,pr*.38,pr*.28,.5,0,τ);ctx.fill();
  // Craters
  [[-.3,.2,.17],[.35,.4,.13],[-.1,-.4,.11],[.5,-.1,.09],[-.5,.5,.08],[.1,.55,.07]].forEach(([ox,oy,cr])=>{

  });
  ctx.restore();
});}

function txVenus(px,py,pr,spin,tilt){clip(px,py,pr,()=>{

  const g=ctx.createRadialGradient(px-pr*.2,py-pr*.2,0,px,py,pr);
  g.addColorStop(0,'#f5df88');g.addColorStop(.5,'#e8c050');g.addColorStop(1,'#c49020');
  ctx.fillStyle=g;ctx.fillRect(px-pr,py-pr,pr*2,pr*2);

function txEarth(px,py,pr,spin,tilt){clip(px,py,pr,()=>{

/* ════════════════════════════
   LABEL: arm1(radial) + arm2(horizontal) + squares
════════════════════════════ */
function drawLabel(b){
  const sc=toScr(b.wx,b.wy),rsc=Math.max(4,b.wr*V.z),goR=b.goRight,dir=goR?1:-1;
  const anc=b.ancWX!=null?toScr(b.ancWX,b.ancWY):toScr(cx,cy);
  const ang=Math.atan2(sc.y-anc.y,sc.x-anc.x);
  const SQ=4,a1=rsc*1.1+20,a2=66,N='#f5f000';
  const sqX=sc.x+Math.cos(ang)*rsc,sqY=sc.y+Math.sin(ang)*rsc;
  const kx=sc.x+Math.cos(ang)*a1,ky=sc.y+Math.sin(ang)*a1;
  const fx=kx+dir*a2,fy=ky;
  ctx.save();ctx.strokeStyle=N;ctx.fillStyle=N;ctx.lineWidth=1.5;ctx.shadowColor=N;ctx.shadowBlur=6;
  ctx.fillRect(sqX-SQ/2,sqY-SQ/2,SQ,SQ);
  ctx.beginPath();ctx.moveTo(sqX,sqY);ctx.lineTo(kx,ky);ctx.stroke();
  ctx.beginPath();ctx.moveTo(kx,ky);ctx.lineTo(fx,fy);ctx.stroke();
  ctx.fillRect(fx-SQ/2,fy-SQ/2,SQ,SQ);
  ctx.font='700 11px "Orbitron",monospace';ctx.textAlign=goR?'left':'right';
  ctx.textBaseline='alphabetic';ctx.shadowBlur=10;
  ctx.fillText(b.name,goR?kx+5:kx-5,fy-4);
  ctx.restore();
}

/* ── Orbital mechanics ── */
function kepler(M,e){let E=M;for(let i=0;i<10;i++)E-=(E-e*Math.sin(E)-M)/(1-e*Math.cos(E));return E;}
function orbPos(fx,fy,oR,pd,ec,a0,t,os){
  const M=((τ*t/pd%τ)+τ)%τ,E=kepler(M,ec);
  const nu=2*Math.atan2(Math.sqrt(1+ec)*Math.sin(E/2),Math.sqrt(1-ec)*Math.cos(E/2));
  const r=oR*(1-ec*Math.cos(E)),a=nu+a0;
  return{x:fx+r*os*Math.cos(a),y:fy+r*os*Math.sin(a)};
}
function ellCtr(fx,fy,oR,ec,a0,os){
  const ae=oR*ec*os;return{x:fx-ae*Math.cos(a0),y:fy-ae*Math.sin(a0)};
}

/* ── Spin angle ── */
function spinAngle(planet,t){
  const dir=planet.retro?1:-1;
  return dir*(t/planet.rotPeriod)*τ;
}

/* ── Terminator shadow (day/night boundary) ── */
function drawTerminator(px,py,pr,sunAngle,axialTilt){
  // sunAngle: angle FROM planet TOWARD sun
  // Rotate so the gradient goes from lit-side to dark-side
  // accounting for axial tilt shifting the terminator orientation
  ctx.save();
  ctx.beginPath();ctx.arc(px,py,pr,0,τ);ctx.clip();
  ctx.translate(px,py);
  // The terminator tilts with axial tilt: tilt rotates which direction is "ecliptic north"
  ctx.rotate(sunAngle+Math.PI+axialTilt*.35);// .35 scales 2D tilt effect
  ctx.translate(-px,-py);
  const g=ctx.createLinearGradient(px-pr,py,px+pr,py);
  g.addColorStop(0,'rgba(0,0,0,0)');
  g.addColorStop(0.35,'rgba(0,0,0,0)');
  g.addColorStop(0.52,'rgba(0,0,20,0.25)');
  g.addColorStop(0.72,'rgba(0,0,10,0.60)');
  g.addColorStop(1,'rgba(0,0,5,0.82)');
  ctx.fillStyle=g;ctx.fillRect(px-pr,py-pr,pr*2,pr*2);
  ctx.restore();
}

/* ── Axial tilt indicator (visible when zoomed in, pr > 20px) ── */
function drawTiltIndicator(px,py,pr,axialTilt){
  if(pr<18)return;
  const len=pr*1.35,ax=Math.cos(axialTilt+Math.PI/2),ay=Math.sin(axialTilt+Math.PI/2);
  ctx.save();
  ctx.strokeStyle='rgba(245,240,0,0.28)';ctx.lineWidth=1;
  ctx.setLineDash([3,4]);
  ctx.beginPath();ctx.moveTo(px-ax*len,py-ay*len);ctx.lineTo(px+ax*len,py+ay*len);ctx.stroke();
  ctx.setLineDash([]);ctx.restore();
}

}));

function findHit(wx,wy){
  let best=null,bd=Infinity;
  for(const b of bodies){
    const d=Math.hypot(wx-b.wx,wy-b.wy),hit=Math.max(b.wr*1.8,7/V.z);
    if(d<hit&&d<bd){best=b;bd=d;}
  }
  return best;
}

/* ════════════════════════════
   MAIN LOOP
════════════════════════════ */
function draw(ts){
  if(lastTs===null)lastTs=ts;
  const dt=(ts-lastTs)/1000;lastTs=ts;
  if(!paused)simT+=dt*speedMult;

  V.x+=(V.tx-V.x)*.09;V.y+=(V.ty-V.y)*.09;V.z+=(V.tz-V.z)*.09;
  W=canvas.width;H=canvas.height;cx=W/2;cy=H/2;
  const os=Math.min(W,H)/2/545*.92;

  /* Track selected body */
  if(selectedBody){const b=bodies.find(b=>b.name===selectedBody);if(b){V.tx=-(b.wx-cx)*V.tz;V.ty=-(b.wy-cy)*V.tz;}}

  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#00000c';ctx.fillRect(0,0,W,H);
  [[cx*.45,cy*.65,W*.28,'rgba(90,0,140,.07)'],[cx*1.55,cy*1.4,W*.22,'rgba(0,90,130,.06)'],[cx*.2,cy*1.6,W*.18,'rgba(0,140,100,.04)']].forEach(([nx,ny,nr,nc])=>{
    const nb=ctx.createRadialGradient(nx,ny,0,nx,ny,nr);nb.addColorStop(0,nc);nb.addColorStop(1,'transparent');ctx.fillStyle=nb;ctx.fillRect(0,0,W,H);
  });
  bgStars.forEach(s=>{ctx.globalAlpha=s.a;ctx.fillStyle=s.c;ctx.beginPath();ctx.arc(s.x*W,s.y*H,s.r,0,τ);ctx.fill();});ctx.globalAlpha=1;

  /* Apply view transform */
  ctx.save();
  ctx.translate(V.x,V.y);ctx.translate(cx,cy);ctx.scale(V.z,V.z);ctx.translate(-cx,-cy);
  bodies=[];

  /* Orbital paths */
  ctx.save();ctx.setLineDash([9,8]);ctx.lineWidth=1;
  PLANETS.forEach(p=>{const a=p.orbR*os,b=a*Math.sqrt(1-p.ecc*p.ecc),ec=ellCtr(cx,cy,p.orbR,p.ecc,p.ang0,os);ctx.strokeStyle='rgba(0,220,220,.22)';ctx.beginPath();ctx.ellipse(ec.x,ec.y,a,b,p.ang0,0,τ);ctx.stroke();});
  DWARFS.forEach(d=>{const a=d.orbR*os,b=a*Math.sqrt(1-d.ecc*d.ecc),ec=ellCtr(cx,cy,d.orbR,d.ecc,d.ang0,os);ctx.strokeStyle='rgba(0,170,170,.08)';ctx.beginPath();ctx.ellipse(ec.x,ec.y,a,b,d.ang0,0,τ);ctx.stroke();});
  ctx.setLineDash([]);ctx.restore();

  /* Belts */
  asteroids.forEach(a=>{const ang=a.ang0+simT*a.sp;ctx.fillStyle=a.c;ctx.beginPath();ctx.arc(cx+a.r*os*Math.cos(ang),cy+a.r*os*Math.sin(ang),a.sz,0,τ);ctx.fill();});
  kuiper.forEach(k=>{const ang=k.ang0+simT*k.sp;ctx.fillStyle=k.c;ctx.beginPath();ctx.arc(cx+k.r*os*Math.cos(ang),cy+k.r*os*Math.sin(ang),k.sz,0,τ);ctx.fill();});

  /* Sun */
  const sr=36*os;
  const sg=ctx.createRadialGradient(cx,cy,sr*.5,cx,cy,sr*3.5);sg.addColorStop(0,'rgba(255,80,200,.35)');sg.addColorStop(.4,'rgba(200,0,255,.12)');sg.addColorStop(1,'transparent');
  ctx.fillStyle=sg;ctx.beginPath();ctx.arc(cx,cy,sr*3.5,0,τ);ctx.fill();
  if(sunImg.complete&&sunImg.naturalWidth>0)ctx.drawImage(sunImg,cx-sr,cy-sr,sr*2,sr*2);
  else{ctx.fillStyle='#ff00cc';ctx.beginPath();ctx.arc(cx,cy,sr,0,τ);ctx.fill();}

  /* Dwarfs */
  DWARFS.forEach(d=>{
    const pos=orbPos(cx,cy,d.orbR,d.period,d.ecc,d.ang0,simT,os),dr=Math.max(1.5,d.r*os);
    const goR=updateSide(d,pos.x);
    ctx.fillStyle=d.color;ctx.shadowColor=d.color;ctx.shadowBlur=5;
    ctx.beginPath();ctx.arc(pos.x,pos.y,dr,0,τ);ctx.fill();ctx.shadowBlur=0;
    bodies.push({name:d.name,wx:pos.x,wy:pos.y,wr:dr,goRight:goR,type:'dwarf'});
  });

  /* Comets */
  COMETS.forEach(c=>{
    const M2=((τ*simT/c.period%τ)+τ)%τ,E=kepler(M2,c.ecc);
    const nu=2*Math.atan2(Math.sqrt(1+c.ecc)*Math.sin(E/2),Math.sqrt(1-c.ecc)*Math.cos(E/2));
    const r=c.semiMajor*(1-c.ecc*Math.cos(E)),a=nu+c.ang0;
    const px=cx+r*os*Math.cos(a),py=cy+r*os*Math.sin(a)*Math.cos(c.tilt);
    if(px<-120||px>W+120||py<-120||py>H+120)return;
    const td=Math.atan2(py-cy,px-cx),cl=Math.max(0,1-r/(c.semiMajor*1.05)),tl=(55+cl*130)*os;
    const tx=px+Math.cos(td)*tl,ty=py+Math.sin(td)*tl;
    ctx.save();const tg=ctx.createLinearGradient(px,py,tx,ty);tg.addColorStop(0,c.color+'bb');tg.addColorStop(1,c.color+'00');
    ctx.strokeStyle=tg;ctx.lineWidth=Math.max(1,1.8*os);ctx.shadowColor=c.color;ctx.shadowBlur=8;
    ctx.beginPath();ctx.moveTo(px,py);ctx.lineTo(tx,ty);ctx.stroke();
    ctx.fillStyle='#ffffff';ctx.shadowBlur=14;ctx.beginPath();ctx.arc(px,py,Math.max(1.5,2.5*os),0,τ);ctx.fill();ctx.restore();
    bodies.push({name:c.name,wx:px,wy:py,wr:Math.max(3,3*os),goRight:updateSide(c,px),type:'comet'});
  });

  /* Planets + moons */
  PLANETS.forEach(p=>{
    const pos=orbPos(cx,cy,p.orbR,p.period,p.ecc,p.ang0,simT,os);
    const pr=Math.max(2.5,p.r*os);
    const goR=updateSide(p,pos.x);
    if(p.rings)drawSaturnRings(pos.x,pos.y,pr);

    /* Moons – draw before planet body so planet overlays inner moons */
    p.moons.forEach(m=>{
      const mp=orbPos(pos.x,pos.y,m.orbR,m.period,m.ecc,m.ang0,simT,os);
      const mr=Math.max(.5,m.r*os),mGoR=updateSide(m,mp.x);
      const mSpin=spinAngle({rotPeriod:m.period*0.5,retro:false},simT);
      const hasTexture=['LUNA','IO','EUROPA','GANYMEDE','CALLISTO','TITAN','TRITON','ENCELADUS','MIMAS'].includes(m.name);
      
      if(hasTexture){
        drawMoon(m.name,mp.x,mp.y,mr,mSpin,p.tilt*0.5);
      } else {
        ctx.globalAlpha=.9;
        ctx.fillStyle=m.color;
        if(m.r>=1.5){ctx.shadowColor=m.color;ctx.shadowBlur=4;}
        ctx.beginPath();ctx.arc(mp.x,mp.y,mr,0,τ);ctx.fill();
        ctx.globalAlpha=1;ctx.shadowBlur=0;
      }
      bodies.push({name:m.name,wx:mp.x,wy:mp.y,wr:mr,goRight:mGoR,type:'moon',ancWX:pos.x,ancWY:pos.y});
    });

    /* Planet glow */
    if(p.glow){const gl=ctx.createRadialGradient(pos.x,pos.y,0,pos.x,pos.y,pr*2.8);gl.addColorStop(0,`rgba(${p.glow},.38)`);gl.addColorStop(1,'transparent');ctx.fillStyle=gl;ctx.beginPath();ctx.arc(pos.x,pos.y,pr*2.8,0,τ);ctx.fill();}

    /* Planet body with texture, spin and terminator */
    const pSpin=spinAngle(p,simT);
    const sunDir=Math.atan2(cy-pos.y,cx-pos.x); // angle from planet toward sun
    drawBody(p.name,pos.x,pos.y,pr,pSpin,p.tilt);
    drawTerminator(pos.x,pos.y,pr,sunDir,p.tilt);
    drawTiltIndicator(pos.x,pos.y,pr,p.tilt);
    if(p.thinRings)drawUranusRings(pos.x,pos.y,pr);
    bodies.push({name:p.name,wx:pos.x,wy:pos.y,wr:pr,goRight:goR,type:'planet'});
  });

  ctx.restore();/* end view transform */

  /* Hover label (screen space) */
  if(hovered){const fresh=bodies.find(b=>b.name===hovered.name);if(fresh)drawLabel(fresh);}

  requestAnimationFrame(draw);
}
requestAnimationFrame(draw);

const resetBtn=document.getElementById('zoom-reset');

function canMouse(e){const r=canvas.getBoundingClientRect();return{x:e.clientX-r.left,y:e.clientY-r.top};}

/* Wheel zoom */
canvas.addEventListener('wheel',e=>{
  e.preventDefault();
  const{x,y}=canMouse(e);const delta=e.deltaY>0?.88:1/.88;
  const nz=Math.min(18,Math.max(.2,V.tz*delta));
  const wx=(x-V.x-cx)/V.tz+cx,wy=(y-V.y-cy)/V.tz+cy;
  V.tx=x-cx-(wx-cx)*nz;V.ty=y-cy-(wy-cy)*nz;V.tz=nz;
  selectedBody=null;resetBtn.style.display=nz!==1?'block':'none';
},{passive:false});

/* Drag */
canvas.addEventListener('mousedown',e=>{
  drag.on=true;drag.moved=false;drag.fromCanvas=true;
  drag.sx=e.clientX;drag.sy=e.clientY;drag.spx=V.tx;drag.spy=V.ty;
  canvas.classList.add('dragging');
});
window.addEventListener('mousemove',e=>{
  if(drag.on){
    const dx=e.clientX-drag.sx,dy=e.clientY-drag.sy;
    if(Math.abs(dx)+Math.abs(dy)>3)drag.moved=true;
    V.tx=drag.spx+dx;V.ty=drag.spy+dy;V.x=V.tx;V.y=V.ty;selectedBody=null;
  }
  const r=canvas.getBoundingClientRect();
  const mw=toWld(e.clientX-r.left,e.clientY-r.top);
  const hit=findHit(mw.x,mw.y);hovered=hit||null;
  if(!drag.on){canvas.classList.toggle('hovering',!!hovered);canvas.classList.remove('dragging');}
});
window.addEventListener('mouseup',e=>{
  /* Only process planet click if mousedown was on canvas */
  if(drag.fromCanvas&&!drag.moved){
    const{x,y}=canMouse(e);const wc=toWld(x,y);const hit=findHit(wc.x,wc.y);
    if(hit){
      const zl=hit.type==='moon'?10:hit.type==='dwarf'?4:5;
      V.tz=zl;V.tx=-(hit.wx-cx)*zl;V.ty=-(hit.wy-cy)*zl;
      selectedBody=hit.name;resetBtn.style.display='block';
    } else {selectedBody=null;}
  }
  drag.on=false;drag.moved=false;drag.fromCanvas=false;
  canvas.classList.remove('dragging');
});

resetBtn.addEventListener('click',()=>{V.tz=1;V.tx=0;V.ty=0;selectedBody=null;resetBtn.style.display='none';});

/* Pause & Speed – do NOT clear selectedBody */
const pauseBtn=document.getElementById('btn-pause');
pauseBtn.addEventListener('mousedown',e=>e.stopPropagation());
pauseBtn.addEventListener('click',e=>{
  e.stopPropagation();paused=!paused;
  pauseBtn.textContent=paused?'▶ RESUME':'⏸ PAUSE';pauseBtn.classList.toggle('paused',paused);
});

const slider=document.getElementById('spd-slider');
const sLabels=document.querySelectorAll('#spd-labels span');
function setSpeed(idx){
  speedMult=SPEEDS[idx];slider.value=idx;
  sLabels.forEach((s,i)=>s.classList.toggle('active',i===idx));
  if(paused){paused=false;pauseBtn.textContent='⏸ PAUSE';pauseBtn.classList.remove('paused');}
}
slider.addEventListener('mousedown',e=>e.stopPropagation());
slider.addEventListener('input',e=>{e.stopPropagation();setSpeed(parseInt(slider.value));});
sLabels.forEach((s,i)=>{
  s.addEventListener('mousedown',e=>e.stopPropagation());
  s.addEventListener('click',e=>{e.stopPropagation();setSpeed(i);});
});
document.getElementById('sol-controls').addEventListener('mousedown',e=>e.stopPropagation());

/* Touch */
let touches={},pinchD=null;
canvas.addEventListener('touchstart',e=>{
  e.preventDefault();Array.from(e.changedTouches).forEach(t=>touches[t.identifier]={x:t.clientX,y:t.clientY});
  if(Object.keys(touches).length===1){const t=e.touches[0];drag.on=true;drag.moved=false;drag.fromCanvas=true;drag.sx=t.clientX;drag.sy=t.clientY;drag.spx=V.tx;drag.spy=V.ty;}
  if(Object.keys(touches).length===2){const ts=Object.values(touches);pinchD=Math.hypot(ts[0].x-ts[1].x,ts[0].y-ts[1].y);}
},{passive:false});
canvas.addEventListener('touchmove',e=>{
  e.preventDefault();Array.from(e.changedTouches).forEach(t=>{if(touches[t.identifier])touches[t.identifier]={x:t.clientX,y:t.clientY};});
  const ts=Object.values(touches);
  if(ts.length===1&&drag.on){const dx=ts[0].x-drag.sx,dy=ts[0].y-drag.sy;if(Math.abs(dx)+Math.abs(dy)>3)drag.moved=true;V.tx=drag.spx+dx;V.ty=drag.spy+dy;V.x=V.tx;V.y=V.ty;}
  if(ts.length===2&&pinchD){const nd=Math.hypot(ts[0].x-ts[1].x,ts[0].y-ts[1].y);V.tz=Math.min(18,Math.max(.2,V.tz*(nd/pinchD)));pinchD=nd;resetBtn.style.display='block';}
},{passive:false});
canvas.addEventListener('touchend',e=>{Array.from(e.changedTouches).forEach(t=>delete touches[t.identifier]);if(Object.keys(touches).length<2)pinchD=null;drag.on=false;});
})();
</script>
</body>
